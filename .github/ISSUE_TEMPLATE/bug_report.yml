name: Bug report
description: Report something that is not working as expected.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug in bongodoro-cat.nvim.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened? What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest config or steps needed to reproduce.
      placeholder: |
        1. Install plugin with ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Plugin config
      render: lua
  - type: input
    id: nvim-version
    attributes:
      label: Neovim version
      placeholder: "nvim --version"
  - type: textarea
    id: health
    attributes:
      label: Health check output
      description: Run `:checkhealth bongo_cat` and paste relevant output.
      render: text
  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Screenshots, terminal, OS, or anything else useful.
