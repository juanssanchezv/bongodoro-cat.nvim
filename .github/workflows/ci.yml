name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:neovim-ppa/stable
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Show Neovim version
        run: nvim --version

      - name: Run smoke test
        run: nvim --headless -u NONE -l ./scripts/smoke_test.lua

      - name: Run health check
        run: nvim --headless -u NONE --cmd 'set rtp+=.' +':checkhealth bongo_cat' +qa
